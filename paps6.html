    function getUnit(eventName) {
      if (eventName === "왕복오래달리기" || eventName === "윗몸말아올리기") return "회";
      if (eventName === "오래달리기걷기" || eventName === "50m달리기") return "초";
      if (eventName === "앉아윗몸앞으로굽히기" || eventName === "제자리멀리뛰기") return "cm";
      if (eventName === "악력") return "kg";
      if (eventName === "체질량지수(BMI)") return "";
      return "";
    }

    function calc() {
      const gender = document.getElementById("gender").value;
      const eventName = document.getElementById("event").value;
      const record = parseFloat(document.getElementById("record").value);
      const unit = getUnit(eventName);
      const resultBox = document.getElementById("result");

      if (isNaN(record)) {
        resultBox.innerHTML = '<span class="warn">기록을 숫자로 입력해주세요.</span>';
        return;
      }

      const found = data.find(x =>
        x.s === gender &&
        x.e === eventName &&
        record >= x.a &&
        record <= x.b
      );

      if (!found) {
        resultBox.innerHTML = '<span class="warn">결과를 찾지 못했습니다. 숫자나 종목을 다시 확인해주세요.</span>';
        return;
      }

      if (eventName === "체질량지수(BMI)") {
        resultBox.innerHTML =
          '<div class="ok">판정: ' + found.l + '</div>' +
          '<div>점수: ' + found.p + '점</div>' +
          '<div class="small">입력값: ' + record + '</div>' +
          '<div class="small">기준구간: ' + found.a + ' ~ ' + found.b + '</div>';
      } else {
        resultBox.innerHTML =
          '<div class="ok">등급: ' + found.l + '</div>' +
          '<div>점수: ' + found.p + '점</div>' +
          '<div class="small">입력값: ' + record + ' ' + unit + '</div>' +
          '<div class="small">기준구간: ' + found.a + ' ~ ' + found.b + ' ' + unit + '</div>';
      }
    }
